<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Space Invaders Phaser</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
    <style>
        body {
            /* Fallback black background */
            background-color: #000; 
            margin: 0; 
            overflow: hidden;           
            
            /* Centers the game */
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            height: 100vh; 
            
            /* CRITICAL FOR MOBILE: Prevents swipe-to-scroll or pinch-to-zoom */
            touch-action: none; 
        }
        
        h1 {
            display: none; 
        }
        
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%; 
            object-fit: contain;
            
            /* 1. THE GAME BORDER */
            border: 2px solid #444; /* Dark grey border to define the playable area */
            background-color: #000; /* Ensures the inside stays pitch black */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.9); /* Adds depth so it looks like a screen */
        }

        /* 2. RESPONSIVE TILED BACKGROUND */
        /* Only applies if the screen is wider than 950px */
        @media (min-width: 950px) {
            body {
                /* SVG Background Implementation */
                background-image: url('./assets/SI_BG.svg'); 
                background-repeat: repeat;
                background-size: 100px; /* SVG-optimized size for a dense pattern */
                
                /* This dims the background art slightly so it doesn't distract from the bright game */
                background-color: rgba(0, 0, 0, 0.85);
                background-blend-mode: multiply;
            }
        }

        /* =========================================
           VIRTUAL GAMEPAD (MOBILE CONTROLS)
           ========================================= */
        #mobile-controls {
            display: none; /* Hidden on desktop by default */
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .control-btn {
            background: rgba(231, 76, 60, 0.6); /* Translucent red to match your portfolio */
            border: 2px solid #e74c3c;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Prevents double-tap zooming or text selection */
            user-select: none;
            -webkit-user-select: none;
            outline: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .control-btn:active {
            background: rgba(231, 76, 60, 1);
            transform: scale(0.95); /* Satisfying physical press effect */
        }

        .fire-btn {
            width: 100px;
            height: 80px;
            border-radius: 15px;
            font-size: 18px;
            letter-spacing: 1px;
        }

        /* Displays the buttons ONLY on small screens OR devices with touchscreens */
        @media (max-width: 768px), (pointer: coarse) {
            #mobile-controls {
                display: flex;
            }
            /* Shrink the game slightly on mobile so it doesn't overlap the thumbs */
            canvas {
                max-height: calc(100vh - 140px);
                margin-bottom: 110px;
            }
        }
    </style>
</head>
<body>

    <div id="mobile-controls">
        <button id="btn-left" class="control-btn">◀</button>
        <button id="btn-shoot" class="control-btn fire-btn">FIRE</button>
        <button id="btn-right" class="control-btn">▶</button>
    </div>

    <script type="module" src="Game.js"></script>

    <script>
        // Dispatches fake keyboard events to trick the game engine
        function simulateKey(eventType, keyCode, keyStr) {
            const event = new KeyboardEvent(eventType, {
                bubbles: true,
                cancelable: true,
                keyCode: keyCode,
                key: keyStr,
                code: keyStr === ' ' ? 'Space' : keyStr
            });
            document.dispatchEvent(event);
            window.dispatchEvent(event);
        }

        function attachControl(buttonId, keyCode, keyStr) {
            const btn = document.getElementById(buttonId);
            if (!btn) return;

            // Handle touch screens
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault(); 
                simulateKey('keydown', keyCode, keyStr);
            }, { passive: false });

            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                simulateKey('keyup', keyCode, keyStr);
            }, { passive: false });

            // Handle mouse clicks (so you can test it on desktop if you shrink the window)
            btn.addEventListener('mousedown', () => simulateKey('keydown', keyCode, keyStr));
            btn.addEventListener('mouseup', () => simulateKey('keyup', keyCode, keyStr));
            btn.addEventListener('mouseleave', () => simulateKey('keyup', keyCode, keyStr));
        }

        // Map the buttons to their respective keyboard keys once the page loads
        window.addEventListener('DOMContentLoaded', () => {
            // Left Arrow = 37, Right Arrow = 39, Spacebar = 32
            attachControl('btn-left', 37, 'ArrowLeft');
            attachControl('btn-right', 39, 'ArrowRight');
            attachControl('btn-shoot', 32, ' ');
        });
    </script>

</body>
</html>

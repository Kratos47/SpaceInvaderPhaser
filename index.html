<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Space Invaders Arcade</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>

    <style>
        /* CRITICAL: Eliminate all gaps and force full-screen centering */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #arcade-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            /* This prevents the "right-half" glitch */
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div id="arcade-container"></div>

    <script type="module" src="Game.js"></script>

</body>
</html>
